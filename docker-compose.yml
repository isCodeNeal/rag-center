# First-stage infrastructure: PostgreSQL 16 with the pgvector extension only.
# Redis / Celery (async indexing) and Elasticsearch/OpenSearch (hybrid retrieval)
# are intentionally NOT included yet — they are added in later stages.
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag-center-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_center
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag_center"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    # 自建镜像：官方 ES 8.17.10 + analysis-ik 中文分词插件（见 docker/es/Dockerfile）。
    build: ./docker/es
    image: rag-center-es-ik:8.17.10
    container_name: rag-center-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: rag-center-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    container_name: rag-center-api
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Inside the compose network the DB host is the service name "postgres".
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/rag_center
      MODEL_BASE_URL: ${MODEL_BASE_URL:-https://api.openai.com/v1}
      MODEL_API_KEY: ${MODEL_API_KEY:-your-api-key}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1536}
      # 通用 LLM provider（rerank / query rewrite 等能力共用）
      LLM_PROVIDER: ${LLM_PROVIDER:-openai_compatible}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com/v1}
      LLM_API_KEY: ${LLM_API_KEY:-your-deepseek-api-key}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-60}
      # 重排（rerank）
      RERANK_ENABLED: ${RERANK_ENABLED:-false}
      RERANK_PROVIDER: ${RERANK_PROVIDER:-llm}
      RERANK_TOP_N: ${RERANK_TOP_N:-5}
      RERANK_MAX_CANDIDATES: ${RERANK_MAX_CANDIDATES:-20}
      RERANK_CHUNK_MAX_CHARS: ${RERANK_CHUNK_MAX_CHARS:-1000}
      RERANK_TEMPERATURE: ${RERANK_TEMPERATURE:-0.0}
      # 关键词检索（Elasticsearch BM25 / 混合检索）
      KEYWORD_SEARCH_PROVIDER: ${KEYWORD_SEARCH_PROVIDER:-elasticsearch}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      ELASTICSEARCH_INDEX: ${ELASTICSEARCH_INDEX:-rag_chunks}
      ELASTICSEARCH_ANALYZER: ${ELASTICSEARCH_ANALYZER:-ik_max_word}
      ELASTICSEARCH_SEARCH_ANALYZER: ${ELASTICSEARCH_SEARCH_ANALYZER:-ik_smart}
      # 检索模式与混合检索融合
      RETRIEVAL_MODE: ${RETRIEVAL_MODE:-vector}
      HYBRID_FUSION: ${HYBRID_FUSION:-rrf}
      HYBRID_RRF_K: ${HYBRID_RRF_K:-60}
      HYBRID_VECTOR_TOP_K: ${HYBRID_VECTOR_TOP_K:-20}
      HYBRID_BM25_TOP_K: ${HYBRID_BM25_TOP_K:-20}
      HYBRID_TOP_N: ${HYBRID_TOP_N:-20}
      VECTOR_STORE: pgvector
      CHUNK_SIZE: ${CHUNK_SIZE:-800}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-100}
      TOP_K: ${TOP_K:-5}
      # Celery / Redis（异步索引）。compose 网络内 Redis 主机名为服务名 "redis"。
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    ports:
      - "8000:8000"
    # Run migrations then start the API.
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
  es_data:
